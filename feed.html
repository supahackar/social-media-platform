<!doctype html>
<html lang="en">
<head>
    <title>ClickChat</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="media/icons/website_icon.png?v=3" />
    <link rel="stylesheet" href="styles/global.css" />
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="feed.html" class="nav-logo">
                <svg class="nav-logo-icon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><path fill="currentColor" d="m13.775 22l-3.625-7.8L6 20V2l14 11h-7.1l3.6 7.725z"/></svg>
                ClickChat
            </a>
            <button class="btn btn-secondary btn-small" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <main>
        <div class="feed-layout">
            <!-- Post Creator -->
            <div class="post-creator">
                <h2>What's on your mind?</h2>
                <textarea id="postContent" placeholder="Share something..."></textarea>
                <div class="post-creator-actions">
                    <button class="btn btn-primary" id="createPostBtn">Post</button>
                </div>
            </div>

            <!-- Posts Container -->
            <div class="posts-container" id="postsContainer">
                <!-- Posts will be shown here -->
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-nav">
            <a href="feed.html">Feed</a>
            <a href="users.html">Users</a>
            <a href="profile.html">My Profile</a>
        </div>
    </footer>

    <script src="feed.js"></script>
</body>
</html>
