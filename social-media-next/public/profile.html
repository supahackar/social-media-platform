<!doctype html>
<html lang="en">
<head>
    <title>ClickChat</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="media/icons/website_icon.png?v=3" />
    <link rel="stylesheet" href="styles/global.css" />
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="feed.html" class="nav-logo">
                <svg class="nav-logo-icon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><path fill="currentColor" d="m13.775 22l-3.625-7.8L6 20V2l14 11h-7.1l3.6 7.725z"/></svg>
                ClickChat
            </a>
            <button class="btn btn-secondary btn-small" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <main>
        <!-- Profile Header -->
        <div class="profile-header">
            <div class="profile-info">
                <div class="profile-avatar" id="profileAvatar"></div>
                <div class="profile-details">
                    <h1 id="profileUsername"></h1>
                    <p class="email" id="profileEmail"></p>
                    <p class="bio" id="profileBio"></p>
                    
                    <div class="profile-stats">
                        <div class="profile-stat">
                            <div class="profile-stat-number" id="postsCount">0</div>
                            <div class="profile-stat-label">Posts</div>
                        </div>
                        <div class="profile-stat">
                            <div class="profile-stat-number" id="followersCount">0</div>
                            <div class="profile-stat-label">Followers</div>
                        </div>
                        <div class="profile-stat">
                            <div class="profile-stat-number" id="followingCount">0</div>
                            <div class="profile-stat-label">Following</div>
                        </div>
                    </div>
                    
                    <div class="profile-actions">
                        <button class="btn btn-primary" id="editProfileBtn">Edit Profile</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Profile Form (Hidden by default) -->
        <div id="editProfileForm" style="display: none;">
            <div class="auth-card" style="max-width: 600px; margin: 0 auto 2rem;">
                <h2 style="font-size: 1.5rem; font-weight: 600; margin-bottom: 1.5rem;">Edit Profile</h2>
                
                <div class="form-group">
                    <label for="editUsername">Username</label>
                    <input type="text" id="editUsername" />
                </div>
                
                <div class="form-group">
                    <label for="editBio">Bio</label>
                    <textarea id="editBio" placeholder="Tell us about yourself..."></textarea>
                </div>
                
                <div style="display: flex; gap: 1rem;">
                    <button class="btn btn-primary" id="saveProfileBtn">Save Changes</button>
                    <button class="btn btn-secondary" id="cancelEditBtn">Cancel</button>
                </div>
            </div>
        </div>
        <br
        <!-- User Posts -->
        <div class="feed-layout">
            <h2 style="font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem;">My Posts</h2>
            <div class="posts-container" id="postsContainer">
                <!-- User posts will be rendered here -->
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-nav">
            <a href="feed.html" class="footer-nav-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </a>
            <a href="users.html" class="footer-nav-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.5 1.6 2.5 3.27 2.5 5.45V19h8v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            </a>
            <a href="profile.html" class="footer-nav-btn profile-btn" id="profileNavBtn">
                <div class="footer-profile-avatar" id="footerProfileAvatar"></div>
            </a>
        </div>
    </footer>

    <script src="profile.js"></script>
</body>
</html>
