<!doctype html>
<html lang="en">
<head>
    <title>ClickChat</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="media/icons/website_icon.png?v=3" />
    <link rel="stylesheet" href="styles/global.css" />
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <svg class="nav-logo-icon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><path fill="currentColor" d="m13.775 22l-3.625-7.8L6 20V2l14 11h-7.1l3.6 7.725z"/></svg>
                ClickChat
            </a>
        </div>
    </nav>

    <main class="register-page">
        <div class="auth-container">
            <div class="auth-card">
                <h1>Create Account</h1>
                <p>Join ClickChat and connect with others</p>
                
                <form id="registerForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Choose a username" required />
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required />
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Create a password" required />
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required />
                    </div>
                    
                    <div id="errorMessage" class="error-message"></div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
                </form>
                
                <a href="login.html" class="btn btn-secondary" style="width: 100%; margin-top: 1rem; text-align: center; display: block;">Already have an account?</a>
            </div>
        </div>
    </main>

    <script src="register.js"></script>
</body>
</html>
