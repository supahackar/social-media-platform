<!doctype html>
<html lang="en">
<head>
    <title>Register - Social Media Platform</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/global.css" />
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="nav-logo">SocialHub</a>
            <div class="nav-links">
                <a href="login.html">Login</a>
                <a href="register.html">Register</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="auth-container">
            <div class="auth-card">
                <h1>Create Account</h1>
                <p>Join SocialHub and connect with others</p>
                
                <form id="registerForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required />
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required />
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required />
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required />
                    </div>
                    
                    <div id="errorMessage" class="error-message"></div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
                </form>
                
                <div class="auth-link">
                    Already have an account? <a href="login.html">Login here</a>
                </div>
            </div>
        </div>
    </main>

    <script src="register.js"></script>
</body>
</html>
